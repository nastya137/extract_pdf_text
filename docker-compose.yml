version: '3.8'

services:
  pdf-extractor:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
      - EXTERNAL_SERVICE_URL=http://mock-service:8080/process
      - LOG_LEVEL=INFO
      - ENABLE_OCR=true
    depends_on:
      - mock-service

  mock-service:
    image: mendhak/http-https-echo:latest
    ports:
      - "8001:8080"
    environment:
      - ECHO_BACK_TO_CLIENT=true